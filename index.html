// ── SUPABASE ──────────────────────────────────────────────────────────────
async function supa(method, table, body, query) {
  const url = SUPA_URL + "/rest/v1/" + table + (query ? "?" + query : "");
  const hdrs = {"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY};
  if (method==="POST"||method==="PATCH") hdrs["Prefer"]="return=representation";
  const res = await fetch(url,{method,headers:hdrs,body:body?JSON.stringify(body):undefined});
  if (!res.ok) { const e=await res.text(); throw new Error(table+": "+e); }
  if (res.status===204||method==="DELETE") return null;
  return res.json();
}

function Spinner() {

// ── PROTEIN DAYS METRIC ──────────────────────────────────────────────────
function ProteinDaysMetric({allFood, protTgt}) {
  const daysHit = Object.entries(allFood).filter(([date, meals]) => {
    const total = meals.reduce((s,e)=>s+(e.p||0),0);
    return total >= protTgt;
  }).length;
  const totalDaysLogged = Object.keys(allFood).length;
  return (
    <div style={s.mc}>
      <div style={s.ml}>Protein days hit</div>
      <div style={{...s.mv,color:daysHit>0?C.tm:C.t3}}>{daysHit>0?daysHit:"—"}</div>
      <div style={{...s.ms,color:daysHit>0?C.tm:C.t3}}>
        {daysHit>0?`of ${totalDaysLogged} days logged`:"log meals to track"}
      </div>
    </div>
  );
}

function HeatmapGrid({allFood={}, protTgt=100}) {
  const today = new Date().getDate();
  const firstDay = new Date(2026,5,1).getDay(); // June 2026 starts on Monday=1
  const days = ["S","M","T","W","T","F","S"];
  const cells = [];
  // day labels
  days.forEach((d,i)=>cells.push(<div key={"lbl"+i} style={{fontSize:9,color:C.t3,textAlign:"center"}}>{d}</div>));
  // padding
  for(let i=0;i<firstDay;i++) cells.push(<div key={"pad"+i}/>);
  // days
  for(let d=1;d<=30;d++){
    const w=JUNE_WORKOUTS[d]||[];
    const steps=JUNE_STEPS[d]||0;
    const isActive=steps>=8000||w.length>0;
    const hasGym=w.includes("gym"),hasYoga=w.includes("yoga"),hasCardio=w.includes("walk")||w.includes("elliptical")||w.includes("run");
    cells.push(
      <div key={"d"+d} style={{borderRadius:4,background:C.s2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",gap:2,padding:3,position:"relative",overflow:"hidden",minHeight:52,border:isActive?`2px solid ${C.tm}`:"2px solid transparent",boxSizing:"border-box",...(d===today?{outline:`2px solid ${C.tx}`}:{})}}>
        {steps>=10000&&<span style={{fontSize:7,fontWeight:700,color:C.teal,position:"absolute",top:2,right:2}}>10k</span>}
        {(()=>{const dateStr=`2026-06-${String(d).padStart(2,"0")}`;const dayMeals=allFood[dateStr]||[];const dayProt=dayMeals.reduce((s,e)=>s+(e.p||0),0);return dayProt>=protTgt?<span style={{fontSize:7,fontWeight:700,color:C.tm,position:"absolute",top:2,left:2}}>P✓</span>:null;})()}
        {hasGym&&<div style={{width:"100%",borderRadius:3,padding:"2px 3px",fontSize:9,fontWeight:600,textAlign:"center",background:C.pl,color:C.pu}}>gym</div>}
        {hasYoga&&<div style={{width:"100%",borderRadius:3,padding:"2px 3px",fontSize:9,fontWeight:600,textAlign:"center",background:C.orl,color:C.or}}>yoga</div>}
        {hasCardio&&<div style={{width:"100%",borderRadius:3,padding:"2px 3px",fontSize:9,fontWeight:600,textAlign:"center",background:C.tl,color:C.teal}}>{w.includes("run")?"run":"cardio"}</div>}
      </div>
    );
  }
  return <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>{cells}</div>;
}

// ── FOOD TAB ──────────────────────────────────────────────────────────────
function TabFood({allFood, setAllFood, protTgt, apiKey}) {
  const [foodDate, setFoodDate] = useState(tkey());
  const [showTxt, setShowTxt] = useState(false);
  const [txtInput, setTxtInput] = useState("");
  const [mealDate, setMealDate] = useState(tkey());
  const [mealTime, setMealTime] = useState(new Date().toTimeString().slice(0,5));
  const [analysing, setAnalysing] = useState(false);
  const [aiMsg, setAiMsg] = useState("");
  const [editIdx, setEditIdx] = useState(null);
  const [editEntry, setEditEntry] = useState({});

  const food = allFood[foodDate]||[];
  const tp=food.reduce((s,e)=>s+(e.p||0),0);
  const tc=food.reduce((s,e)=>s+(e.c||0),0);
  const tf=food.reduce((s,e)=>s+(e.f||0),0);
  const tk=food.reduce((s,e)=>s+(e.k||0),0);
  const pct=Math.min(100,Math.round(tp/protTgt*100));

  const isToday = foodDate===tkey();
  const dateLabel = isToday?"Today":new Date(foodDate).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"short"});

  function prevDay(){const d=new Date(foodDate);d.setDate(d.getDate()-1);setFoodDate(d.toISOString().slice(0,10));}
  function nextDay(){const d=new Date(foodDate);d.setDate(d.getDate()+1);if(d.toISOString().slice(0,10)<=tkey())setFoodDate(d.toISOString().slice(0,10));}

  async function analyseText() {
    if(!txtInput.trim()||!apiKey) return;
    setAnalysing(true);setAiMsg("Analysing...");
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,messages:[{role:"user",content:'Return ONLY valid JSON: {"n":"name","det":"brief desc","p":25,"c":30,"f":12,"k":330}. Analyse: '+txtInput}]})
      });
      const d=await res.json();
      if(d.error) throw new Error(d.error.message);
      const raw=d.content[0].text.trim();
      const entry=JSON.parse(raw.replace(/```json|```/g,"").trim());
      entry.time=mealTime;
      // Save to Supabase
      const targetDate=mealDate||foodDate;
      try {
        const rows=await supa("POST","food_log",{user_id:UID,log_date:targetDate,meal_time:mealTime,name:entry.n,detail:entry.det||null,protein:entry.p,carbs:entry.c,fat:entry.f,kcal:entry.k});
        if(rows&&rows[0]) entry.dbid=rows[0].id;
      } catch(e) {}
      setAllFood(prev=>({...prev,[targetDate]:[...(prev[targetDate]||[]),entry]}));
      setAiMsg(entry.n+" logged ✓");
      setTxtInput("");setShowTxt(false);
    } catch(e){setAiMsg("Error: "+e.message);}
    setAnalysing(false);
  }

  async function delFood(i) {
    const entry=food[i];
    if(entry?.dbid){try{await supa("DELETE","food_log",null,"id=eq."+entry.dbid);}catch(e){}}
    setAllFood(prev=>({...prev,[foodDate]:prev[foodDate].filter((_,j)=>j!==i)}));
  }

  async function saveEdit() {
    const newP=parseFloat(editEntry.p)||0,newC=parseFloat(editEntry.c)||0,newF=parseFloat(editEntry.f)||0;
    const newK=Math.round(newP*4+newC*4+newF*9);
    const updated={...food[editIdx],n:editEntry.n,p:newP,c:newC,f:newF,k:newK};
    if(updated.dbid){try{await supa("PATCH","food_log",{name:updated.n,protein:newP,carbs:newC,fat:newF,kcal:newK},"id=eq."+updated.dbid);}catch(e){}}
    setAllFood(prev=>({...prev,[foodDate]:prev[foodDate].map((e,i)=>i===editIdx?updated:e)}));
    setEditIdx(null);
  }

  const feedbackMsg = ()=>{
    if(tk===0) return "";
    const msgs=[];
    if(tp>=protTgt) msgs.push("Protein goal hit ✅");
    else msgs.push(`${Math.round(protTgt-tp)}g protein to go`);
    if(tc>250) msgs.push("carbs above range");
    if(tf>80) msgs.push("fat above range");
    if(tk>2200) msgs.push("calories above range");
    return msgs.join(" · ");
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <button onClick={prevDay} style={{...s.btn("s"),...s.btnSm}}>←</button>
        <span style={{flex:1,textAlign:"center",fontSize:13,fontWeight:500}}>{dateLabel}</span>
        <button onClick={nextDay} disabled={isToday} style={{...s.btn("s"),...s.btnSm,opacity:isToday?.5:1}}>→</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[["kcal",Math.round(tk),""],["protein",Math.round(tp)+"g",C.tm],["carbs",Math.round(tc)+"g",C.am],["fat",Math.round(tf)+"g",C.pu]].map(([l,v,col])=>(
          <div key={l} style={{background:C.sf,borderRadius:8,border:`.5px solid ${C.bd}`,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:600,color:col||C.tx}}>{v}</div>
            <div style={{fontSize:10,color:C.t3,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
          <span style={{fontWeight:500}}>Daily protein goal</span>
          <span style={{color:C.t2}}>{Math.round(tp)}g / {protTgt}g</span>
        </div>
        <div style={s.pb}><div style={s.pf(pct,pct>=90?C.teal:C.tm)}/></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t3,marginBottom:feedbackMsg()?8:0}}>
          <span>{pct}%</span><span>{Math.max(0,Math.round(protTgt-tp))}g remaining</span>
        </div>
        {feedbackMsg()&&<div style={{fontSize:11,color:tp>=protTgt?C.tm:C.am,textAlign:"center",paddingTop:8,borderTop:`.5px solid ${C.bd}`}}>{feedbackMsg()}</div>}
      </Card>

      {aiMsg&&<div style={{fontSize:12,color:C.teal,padding:"8px 12px",background:C.tl,borderRadius:8,marginBottom:10}}>{aiMsg}</div>}

      <button onClick={()=>{setMealDate(tkey());setMealTime(new Date().toTimeString().slice(0,5));setShowTxt(true);}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:12,width:"100%",marginBottom:14,background:C.sf,border:`1.5px dashed ${C.bd}`,borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontSize:13,color:C.t2}}>
        📝 Log a meal
      </button>

      {/* FOOD ENTRIES */}
      {food.length===0
        ? <div style={{textAlign:"center",padding:"24px 16px",color:C.t3}}><strong style={{display:"block",color:C.t2,marginBottom:4}}>No meals logged{isToday?"":" for this day"}</strong>{isToday?"Tap Type to log your first meal.":""}</div>
        : food.map((e,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:C.sf,borderRadius:8,border:`.5px solid ${C.bd}`,marginBottom:6}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500}}>{e.n}</div>
              <div style={{fontSize:11,color:C.t2,marginTop:1}}>{e.det}</div>
              {e.time&&<div style={{fontSize:10,color:C.t3,marginTop:2}}>{e.time}</div>}
            </div>
            <div style={{display:"flex",gap:6,fontSize:11,marginRight:8}}>
              <span style={{...s.pill(C.tl,C.teal)}}>{Math.round(e.p||0)}g P</span>
              <span style={{...s.pill(C.al,C.am)}}>{Math.round(e.c||0)}g C</span>
              <span style={{...s.pill(C.pl,C.pu)}}>{Math.round(e.f||0)}g F</span>
            </div>
            <button onClick={()=>{setEditIdx(i);setEditEntry({n:e.n,p:Math.round(e.p||0),c:Math.round(e.c||0),f:Math.round(e.f||0)});}} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:11,marginRight:4}}>edit</button>
            <button onClick={()=>delFood(i)} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
        ))
      }

      {/* TYPE MODAL */}
      {showTxt&&(
        <div style={s.mo} onClick={e=>{if(e.target===e.currentTarget)setShowTxt(false);}}>
          <div style={s.modal}>
            <h3 style={{marginBottom:6,fontSize:16,fontWeight:600}}>Describe your meal</h3>
            <p style={{fontSize:13,color:C.t2,marginBottom:16}}>Type what you ate and how much.</p>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.t2,display:"block",marginBottom:3}}>Date</label><input type="date" value={mealDate} onChange={e=>setMealDate(e.target.value)} style={s.input}/></div>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.t2,display:"block",marginBottom:3}}>Time</label><input type="time" value={mealTime} onChange={e=>setMealTime(e.target.value)} style={s.input}/></div>
            </div>
            <textarea value={txtInput} onChange={e=>setTxtInput(e.target.value)} placeholder="e.g. 150g grilled chicken, mixed salad, olive oil dressing" style={{...s.input,resize:"vertical",minHeight:72,marginBottom:16}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowTxt(false)} style={s.btn("s")}>Cancel</button>
              <button onClick={analyseText} disabled={analysing||!txtInput.trim()} style={{...s.btn("p"),opacity:analysing||!txtInput.trim()?.6:1}}>{analysing?"Analysing...":"Analyse"}</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT MODAL */}
      {editIdx!==null&&(
        <div style={s.mo} onClick={e=>{if(e.target===e.currentTarget)setEditIdx(null);}}>
          <div style={s.modal}>
            <h3 style={{marginBottom:16,fontSize:16,fontWeight:600}}>Edit food entry</h3>
            <label style={{fontSize:12,fontWeight:500,color:C.t2,display:"block",marginBottom:4}}>Food name</label>
            <input value={editEntry.n||""} onChange={e=>setEditEntry(p=>({...p,n:e.target.value}))} style={{...s.input,marginBottom:12}}/>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[["Protein (g)","p"],["Carbs (g)","c"],["Fat (g)","f"]].map(([l,k])=>(
                <div key={k} style={{flex:1}}>
                  <label style={{fontSize:11,color:C.t2,display:"block",marginBottom:3}}>{l}</label>
                  <input type="number" value={editEntry[k]||0} onChange={e=>setEditEntry(p=>({...p,[k]:e.target.value}))} style={s.input}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setEditIdx(null)} style={s.btn("s")}>Cancel</button>
              <button onClick={saveEdit} style={s.btn("p")}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CYCLE TAB ─────────────────────────────────────────────────────────────
function TabCycle({cycleDates, setCycleDates}) {
  const [dateInput, setDateInput] = useState("");

  const confirmed = cycleDates.filter(x=>x.ok).sort((a,b)=>new Date(b.d)-new Date(a.d));

  function cycleInfo(){
    if(!confirmed.length) return null;
    const last=new Date(confirmed[0].d);
    const now=new Date();now.setHours(0,0,0,0);
    const day=Math.floor((now-last)/864e5)+1;
    const phase=day<=5?"menstrual":day<=13?"follicular":day<=16?"ovulatory":"luteal";
    return {day:((day-1)%28)+1,phase};
  }

  const info=cycleInfo();
  const PHASES={
    menstrual:{n:"Menstrual",days:"Days 1-5",c:C.red,bg:C.rl},
    follicular:{n:"Follicular",days:"Days 6-13",c:C.teal,bg:C.tl},
    ovulatory:{n:"Ovulatory",days:"Days 14-16",c:C.am,bg:C.al},
    luteal:{n:"Luteal",days:"Days 17-28",c:C.pu,bg:C.pl},
  };

  async function addDate(){
    if(!dateInput) return;
    if(cycleDates.find(x=>x.d===dateInput)) return;
    const newEntry={d:dateInput,ok:true,id:Date.now()};
    try {
      const rows=await supa("POST","cycle_dates",{user_id:UID,date:dateInput,confirmed:true});
      if(rows&&rows[0]) newEntry.id=rows[0].id;
    } catch(e){}
    setCycleDates(prev=>[...prev,newEntry]);
    setDateInput("");
  }

  async function delDate(id){
    setCycleDates(prev=>prev.filter(x=>x.id!==id));
    try{await supa("DELETE","cycle_dates",null,"id=eq."+id);}catch(e){}
  }

  const phase=info?PHASES[info.phase]:null;

  return (
    <div>
      <div style={{background:phase?phase.bg:C.pil,borderRadius:12,padding:"16px 18px",border:`.5px solid ${phase?phase.c+"33":C.pi+"33"}`,marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:C.t3,marginBottom:6}}>Current phase</div>
        <div style={{fontSize:18,fontWeight:600,color:phase?phase.c:C.pi,marginBottom:4}}>
          {phase?phase.n+" — "+phase.days:"Add your cycle dates to get started"}
        </div>
        <div style={{fontSize:12,color:C.t2}}>{phase?"Day "+info.day+" of cycle":"Enter your last period start date below."}</div>
      </div>

      <Card>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:C.t3,marginBottom:8}}>Cycle history</div>
        <p style={{fontSize:12,color:C.t2,marginBottom:12}}>Add each period start date as it happens. The app calculates your current phase from your most recent confirmed date.</p>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input type="date" value={dateInput} onChange={e=>setDateInput(e.target.value)} style={{...s.input,flex:1}}/>
          <button onClick={addDate} style={{...s.btn("p"),...s.btnSm}}>Add</button>
        </div>
        {confirmed.length===0
          ? <div style={{textAlign:"center",padding:"12px 0",color:C.t3,fontSize:13}}><strong style={{display:"block",color:C.t2}}>No dates added yet</strong>Add your most recent period start date above.</div>
          : confirmed.map((e,i)=>(
            <div key={e.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<confirmed.length-1?`.5px solid ${C.bd}`:"none",fontSize:12}}>
              <strong>{new Date(e.d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</strong>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{...s.pill(C.tl,C.teal),fontSize:10}}>Confirmed</span>
                <button onClick={()=>delDate(e.id)} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
              </div>
            </div>
          ))
        }
      </Card>

      <Card>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:C.t3,marginBottom:12}}>Phase guide</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {Object.entries(PHASES).map(([key,p])=>(
            <div key={key} style={{padding:10,background:p.bg,borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:600,color:p.c,marginBottom:4}}>{p.n.toUpperCase()} · {p.days}</div>
              <div style={{fontSize:11,color:C.t2,lineHeight:1.5}}>
                {key==="menstrual"?"Lower intensity. Gentle yoga, walking. Iron-rich foods. Rest is productive.":
                 key==="follicular"?"Rising energy. Best window for new challenges and heavier strength work.":
                 key==="ovulatory"?"Peak strength. Ideal for gym sessions. High protein supports performance.":
                 "Fatigue rises. Higher protein and magnesium. Scale back from day 22."}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

const TAGS=["pain","medical","feedback","postworkout","mood","life","sleep","correction","spine"];
const TAG_LABELS={pain:"Pain",medical:"Medical update",feedback:"Exercise feedback",postworkout:"Post-workout",mood:"Energy / mood",life:"Life context",sleep:"Sleep note",correction:"Correct AI",spine:"Spine update"};
const TAG_STYLE={pain:[C.rl,C.red],medical:[C.tl+"88",C.teal],feedback:[C.tl,C.teal],postworkout:[C.orl,C.or],mood:[C.al,C.am],life:[C.pl,C.pu],sleep:["#f1efe8",C.t2],correction:[C.pil,C.pi],spine:["#e6f1fb","#185FA5"]};

function TabLog({logEntries, setLogEntries}) {
  const [selTag, setSelTag] = useState("pain");
  const [txt, setTxt] = useState("");

  async function addEntry(){
    if(!txt.trim()) return;
    const newEntry={id:Date.now(),dt:new Date().toISOString(),tag:selTag,txt:txt.trim()};
    try {
      const rows=await supa("POST","journal_entries",{user_id:UID,tag:selTag,txt:txt.trim()});
      if(rows&&rows[0]){newEntry.id=rows[0].id;newEntry.dt=rows[0].created_at;}
    }catch(e){}
    setLogEntries(prev=>{
      const updated=[newEntry,...prev];
      localStorage.setItem("jlog_backup",JSON.stringify(updated));
      return updated;
    });
    setTxt("");
  }

  async function delEntry(id){
    setLogEntries(prev=>prev.filter(e=>e.id!==id));
    try{await supa("DELETE","journal_entries",null,"id=eq."+id);}catch(e){}
  }

  return (
    <div>
      <div style={s.aiCard}>
        <div style={s.aiLbl}><div style={{width:6,height:6,borderRadius:"50%",background:C.pu}}/>How the AI coach uses this log</div>
        <div style={{fontSize:12,color:C.tx,lineHeight:1.65}}>Every entry is read before generating recommendations. Log pain, medical updates, physio notes, post-workout feel, energy, mood, or corrections. The coach adjusts based on what you log here.</div>
      </div>

      <Card>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:C.t3,marginBottom:12}}>Add entry</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {TAGS.map(tag=>{
            const [bg,col]=TAG_STYLE[tag]||[C.s2,C.t2];
            const active=selTag===tag;
            return <button key={tag} onClick={()=>setSelTag(tag)} style={{fontSize:11,fontWeight:500,padding:"4px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",background:bg,color:col,border:`1.5px solid ${active?col:"transparent"}`,opacity:active?1:.55}}>{TAG_LABELS[tag]}</button>;
          })}
        </div>
        <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Be specific — e.g. left glute sore after hip thrusts, 4/10, faded by evening." style={{...s.input,resize:"vertical",minHeight:72,marginBottom:10}}/>
        <button onClick={addEntry} style={s.btn("p")}>Save entry</button>
      </Card>

      <SecLabel>Spine history</SecLabel>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{...s.card,borderLeft:`3px solid ${C.am}`,marginBottom:0}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:C.am,marginBottom:8}}>L4-L5 disc herniation</div>
          <div style={{fontSize:12,color:C.t2,lineHeight:1.7}}>
            <div style={{marginBottom:5}}><strong style={{color:C.tx}}>Onset:</strong> Feb–Mar 2025. Radicular pain, nerve compression.</div>
            <div style={{marginBottom:5}}><strong style={{color:C.tx}}>May 2025:</strong> Significant leg pain reduction.</div>
            <div style={{marginBottom:8}}><strong style={{color:C.tx}}>Current:</strong> Left glute pain to outer shin. MRI and physio pending.</div>
            <span style={{...s.pill(C.al,C.am),fontSize:10}}>Monitoring — physio pending</span>
          </div>
        </div>
        <div style={{...s.card,borderLeft:`3px solid #185FA5`,marginBottom:0}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#185FA5",marginBottom:8}}>T9-T10 surgery</div>
          <div style={{fontSize:12,color:C.t2,lineHeight:1.7}}>
            <div style={{marginBottom:5}}><strong style={{color:C.tx}}>Surgery:</strong> T9-T10 decompression ~March 2026.</div>
            <div style={{marginBottom:8}}><strong style={{color:C.tx}}>Status:</strong> Cleared for full activity. Follow-up MRI due Sep 2026.</div>
            <span style={{...s.pill(C.tl,C.teal),fontSize:10}}>Cleared — MRI due Sep 2026</span>
          </div>
        </div>
      </div>

      <SecLabel>All entries</SecLabel>
      {logEntries.length===0
        ? <div style={{textAlign:"center",padding:"24px 16px",color:C.t3}}><strong style={{display:"block",color:C.t2,marginBottom:4}}>No entries yet</strong>Start logging to build your health history.</div>
        : logEntries.map(e=>{
          const [bg,col]=TAG_STYLE[e.tag]||[C.s2,C.t2];
          const d=new Date(e.dt);
          const ds=d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
          return (
            <div key={e.id} style={{...s.card,marginBottom:8,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{...s.pill(bg,col),fontSize:10}}>{TAG_LABELS[e.tag]}</span>
                  <span style={{fontSize:10,color:C.t3}}>{ds}</span>
                </div>
                <button onClick={()=>delEntry(e.id)} style={{background:"none",border:"none",color:C.t3,cursor:"pointer",fontSize:14,padding:2}}>×</button>
              </div>
              <div style={{fontSize:12,lineHeight:1.6}}>{e.txt}</div>
            </div>
          );
        })
      }
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dash");
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem("jkey")||"");
  const [protTgt, setProtTgt] = useState(()=>parseInt(localStorage.getItem("jprot")||"100"));
  const [allFood, setAllFood] = useState({});
  const [logEntries, setLogEntries] = useState([]);
  const [cycleDates, setCycleDates] = useState([]);
  const [suppState, setSuppState] = useState({});
  const [showSett, setShowSett] = useState(false);
  const [showSync, setShowSync] = useState(false);
  const [showChat, setShowChat] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([{role:"ai",txt:"Hi Julia! I have full context on your sleep, workouts, nutrition and health log. What would you like to know?"}]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [syncStatus, setSyncStatus] = useState("Updated Sat 13 Jun 2026, 09:40");
  const [settKey, setSettKey] = useState(apiKey);
  const [settProt, setSettProt] = useState(protTgt);

  useEffect(()=>{
    async function load(){
      setSyncStatus("syncing...");
      // Load settings first
      try{
        const rows=await supa("GET","settings",null,"user_id=eq."+UID+"&select=*");
        if(rows&&rows.length){
          if(rows[0].anthropic_key){setApiKey(rows[0].anthropic_key);localStorage.setItem("jkey",rows[0].anthropic_key);}
          if(rows[0].protein_target){setProtTgt(rows[0].protein_target);localStorage.setItem("jprot",String(rows[0].protein_target));}
        }
      }catch(e){}
      // Load data
      try{
        const [food,log,cyc,supp]=await Promise.all([
          supa("GET","food_log",null,"user_id=eq."+UID+"&order=created_at.asc"),
          supa("GET","journal_entries",null,"user_id=eq."+UID+"&order=created_at.desc&limit=100"),
          supa("GET","cycle_dates",null,"user_id=eq."+UID+"&order=date.asc"),
          supa("GET","supplement_log",null,"user_id=eq."+UID+"&log_date=eq."+tkey()),
        ]);
        const foodMap={};
        (food||[]).forEach(r=>{if(!foodMap[r.log_date])foodMap[r.log_date]=[];foodMap[r.log_date].push({dbid:r.id,n:r.name,det:r.detail,p:r.protein,c:r.carbs,f:r.fat,k:r.kcal,time:r.meal_time});});
        setAllFood(foodMap);
        const logData=(log||[]).map(r=>({id:r.id,dt:r.created_at,tag:r.tag,txt:r.txt}));
        setLogEntries(logData);
        // Keep localStorage in sync as backup
        localStorage.setItem("jlog_backup",JSON.stringify(logData));
        setCycleDates((cyc||[]).map(r=>({id:r.id,d:r.date,ok:r.confirmed})));
        const ss={};(supp||[]).forEach(r=>{if(r.taken)ss[r.supplement]=true;});setSuppState(ss);
        setSyncStatus("Synced "+new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
      }catch(e){
        setSyncStatus("sync error — using local data");
        // Fall back to localStorage backup
        const backup=localStorage.getItem("jlog_backup");
        if(backup) try{setLogEntries(JSON.parse(backup));}catch(ex){}
      }
    }
    load();
  },[]);

  async function saveSett(){
    localStorage.setItem("jkey",settKey);
    localStorage.setItem("jprot",String(settProt));
    setApiKey(settKey);setProtTgt(settProt);
    try{await supa("POST","settings",{user_id:UID,anthropic_key:settKey,protein_target:settProt},"on_conflict=user_id");}catch(e){}
    setShowSett(false);
  }

  async function setSupp(id,val){
    setSuppState(p=>({...p,[id]:val}));
    try{await supa("POST","supplement_log",{user_id:UID,log_date:tkey(),supplement:id,taken:val},"on_conflict=user_id,log_date,supplement");}catch(e){}
  }

  function buildCtxForChat(){
    const todayFood=allFood[tkey()]||[];
    const tp=todayFood.reduce((s,e)=>s+(e.p||0),0);
    const jArr=logEntries.slice(0,12).map(e=>"["+e.tag+"] "+e.txt);
    return `Julia Serebro, 41F, 166cm. Post T9-T10 surgery Mar 2026. L4-L5 disc herniation. Goals: build glutes/legs, upper body strength, lower back stability, cardio. Today Sat 13 Jun 2026: 1102 steps (early morning). Last night Fri 12: 7h sleep (deep 105min 25%, REM 104min 25%), bedtime 01:15. Readiness 89/100 Great. Protein today: ${Math.round(tp)}g/${protTgt}g. Week: 57k steps, 7 sessions (yoga Fri, gym+elliptical+run Thu, gym+walk Mon, yoga Sun). Log: ${jArr.join(" | ")||"none"}`;
  }

  async function sendChat(){
    if(!chatInput.trim()||!apiKey) return;
    const msg=chatInput.trim();setChatInput("");setChatLoading(true);
    setChatMsgs(p=>[...p,{role:"user",txt:msg}]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:buildCtxForChat()+"\n\nAs Julia's AI health coach, answer this: "+msg}]})
      });
      const d=await res.json();
      const reply=d.content?.[0]?.text||"Error";
      setChatMsgs(p=>[...p,{role:"ai",txt:reply}]);
    }catch(e){setChatMsgs(p=>[...p,{role:"ai",txt:"Error: "+e.message}]);}
    setChatLoading(false);
  }

  const TABS=[{id:"dash",label:"Dashboard"},{id:"food",label:"Food"},{id:"cycle",label:"Cycle"},{id:"log",label:"Log"},{id:"profile",label:"Profile"}];

  return (
    <div style={s.shell}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}} * {box-sizing:border-box;margin:0;padding:0}`}</style>

      <div style={s.hdr}>
        <div>
          <h1 style={s.h1}>Health Coach</h1>
          <div style={{fontSize:12,color:C.t2,marginTop:2}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:11,padding:"4px 10px",borderRadius:20,background:C.s2,color:C.t3}}>{syncStatus}</span>
          <button onClick={()=>setTab("cycle")} style={{...s.pill(C.pil,C.pi),border:"none",cursor:"pointer",fontFamily:"inherit"}}>cycle</button>
          <button onClick={()=>setShowSync(true)} style={{...s.btn("s"),...s.btnSm}}>🔄 Sync data</button>
          <button onClick={()=>setShowSett(true)} style={{...s.btn("s"),...s.btnSm}}>⚙ Settings</button>
        </div>
      </div>

      <div style={s.tabs}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={s.tb(tab===t.id)}>{t.label}</button>)}
      </div>

      {tab==="dash" && <TabDash allFood={allFood} logEntries={logEntries} cycleDates={cycleDates} apiKey={apiKey} protTgt={protTgt}/>}
      {tab==="food" && <TabFood allFood={allFood} setAllFood={setAllFood} protTgt={protTgt} apiKey={apiKey}/>}
      {tab==="cycle" && <TabCycle cycleDates={cycleDates} setCycleDates={setCycleDates}/>}
      {tab==="log" && <TabLog logEntries={logEntries} setLogEntries={setLogEntries}/>}
      {tab==="profile" && <TabProfile suppState={suppState} setSupp={setSupp}/>}

      {/* COACH CHAT BUTTON */}
      <button onClick={()=>setShowChat(true)} style={{position:"fixed",bottom:24,right:20,zIndex:50,background:C.pu,color:"#fff",border:"none",borderRadius:30,padding:"12px 18px",fontFamily:"inherit",fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 16px rgba(74,66,176,.35)"}}>
        💬 Ask your coach
      </button>

      {/* CHAT MODAL */}
      {showChat&&(
        <div style={s.mo} onClick={e=>{if(e.target===e.currentTarget)setShowChat(false);}}>
          <div style={{...s.modal,width:440,maxHeight:"80vh",display:"flex",flexDirection:"column",padding:0,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",borderBottom:`.5px solid ${C.bd}`}}>
              <div>
                <h3 style={{fontSize:15,fontWeight:600,margin:0}}>Your AI health coach</h3>
                <p style={{fontSize:11,color:C.t3,margin:"2px 0 0"}}>Asks about your actual data</p>
              </div>
              <button onClick={()=>setShowChat(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.t3}}>×</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10,minHeight:200}}>
              {chatMsgs.map((m,i)=>(
                <div key={i} style={{maxWidth:"88%",padding:"9px 12px",borderRadius:12,fontSize:13,lineHeight:1.55,alignSelf:m.role==="user"?"flex-end":"flex-start",background:m.role==="user"?C.pu:C.s2,color:m.role==="user"?"#fff":C.tx}}>{m.txt}</div>
              ))}
              {chatLoading&&<div style={{alignSelf:"flex-start",background:C.s2,padding:"9px 12px",borderRadius:12,fontSize:13,color:C.t3}}><Spinner/>Thinking...</div>}
            </div>
            <div style={{display:"flex",gap:8,padding:"12px 14px",borderTop:`.5px solid ${C.bd}`}}>
              <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Ask anything about your health..." style={{...s.input,flex:1,borderRadius:20}}/>
              <button onClick={sendChat} style={{...s.btn("p"),borderRadius:20,padding:"9px 16px"}}>Send</button>
            </div>
          </div>
        </div>
      )}

      {/* SYNC MODAL */}
      {showSync&&(
        <div style={s.mo} onClick={e=>{if(e.target===e.currentTarget)setShowSync(false);}}>
          <div style={s.modal}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:8}}>🔄 Sync health data</h3>
            <p style={{fontSize:13,color:C.t2,marginBottom:16,lineHeight:1.6}}>Tapping the button below opens Claude with a pre-filled message. Claude will pull your latest Fitbit data and rebuild the dashboard file for you to download.</p>
            <a
              href={"https://claude.ai/new?q="+encodeURIComponent("Please pull my latest health data from Google Health (steps, sleep, workouts for today and this week) and update my health dashboard file.")}
              target="_blank"
              rel="noopener noreferrer"
              onClick={()=>setShowSync(false)}
              style={{display:"block",background:C.pu,color:"#fff",textAlign:"center",padding:"12px 18px",borderRadius:8,fontWeight:500,fontSize:14,marginBottom:12,textDecoration:"none"}}
            >
              Open Claude &amp; sync →
            </a>
            <p style={{fontSize:11,color:C.t3,lineHeight:1.6}}>After Claude rebuilds the file, download it using the ↓ button and replace your GitHub Pages <code>index.html</code>.</p>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}>
              <button onClick={()=>setShowSync(false)} style={s.btn("s")}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS MODAL */}
      {showSett&&(
        <div style={s.mo} onClick={e=>{if(e.target===e.currentTarget)setShowSett(false);}}>
          <div style={{...s.modal,width:420}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Settings</h3>
            <label style={{fontSize:12,fontWeight:500,color:C.t2,display:"block",marginBottom:4}}>Anthropic API key</label>
            <input type="password" value={settKey} onChange={e=>setSettKey(e.target.value)} placeholder="sk-ant-api03-..." style={{...s.input,marginBottom:4,fontFamily:"monospace",fontSize:12}}/>
            <p style={{fontSize:11,color:C.t3,marginBottom:12}}>Stored locally in your browser only.</p>
            <label style={{fontSize:12,fontWeight:500,color:C.t2,display:"block",marginBottom:4}}>Daily protein target (g)</label>
            <input type="number" value={settProt} onChange={e=>setSettProt(parseInt(e.target.value)||100)} min={50} max={200} style={{...s.input,marginBottom:16}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowSett(false)} style={s.btn("s")}>Cancel</button>
              <button onClick={saveSett} style={s.btn("p")}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
